name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.0

      - run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release bundle
        run: flutter build appbundle --release

      - name: Upload APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} build/app/outputs/flutter-apk/app-release.apk --clobber

      - name: Upload AAB
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} build/app/outputs/bundle/release/app-release.aab --clobber
