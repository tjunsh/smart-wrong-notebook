<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="stylesheet" href="katex.min.css">
<style>
@import url('fonts/KaTeX_Main-Regular.woff2') format('woff2');
@import url('fonts/KaTeX_Main-Bold.woff2') format('woff2');
*{font-family:'KaTeX_Main',serif}
body{margin:0;padding:8px;overflow:hidden;background:transparent}
.katex{font-size:1.1em}
</style>
</head>
<body>
<span id="formula"></span>
<script src="katex.min.js"></script>
<script>
var formula='FORMULA_PLACEHOLDER';
var displayMode='DISPLAY_MODE';
try {
  katex.render(formula, document.getElementById('formula'), {
    throwOnError: false,
    strict: false,
    trust: true,
    displayMode: displayMode === 'true'
  });
  var h = document.body.scrollHeight;
  window.HeightChannel.postMessage(h.toString());
} catch(e) {
  window.HeightChannel.postMessage('40');
}
</script>
</body>
</html>
